
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0e1117;min-height:100vh}
.dk{
  --bg0:#0e1117;--bg1:#161b27;--bg2:#1e2535;--bg3:#252d40;--border:#2a3348;
  --text1:#e8edf5;--text2:#8b95a8;--text3:#4a5568;
  --green:#3dd68c;--green-dim:#1a3d2e;--blue:#60a5fa;--blue-dim:#1e2f4a;
  --amber:#fbbf24;--amber-dim:#3d2e0e;--red:#f87171;--red-dim:#3d1414;
  --purple:#a78bfa;--purple-dim:#2d1f4a;
  font-family:'Space Grotesk',sans-serif;background:var(--bg0);color:var(--text1);
  padding:1.25rem 1rem 2rem;border-radius:16px;
}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.logo-text{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--green);text-transform:uppercase}
.prog-track{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s ease}
.score{font-size:12px;font-weight:600;color:var(--text2);font-family:'JetBrains Mono',monospace}
.sec-tabs{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.sec-tab{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.sec-tab:hover{color:var(--text1);background:var(--bg3);border-color:#3a4560}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;padding:5px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text1);border-color:#3a4560}
.tab.done{border-color:var(--green);color:var(--green)}
.tab.done::after{content:' ✓'}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:.75rem}
.meta{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.pill{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.p-easy{background:var(--green-dim);color:var(--green)}
.p-med{background:var(--amber-dim);color:var(--amber)}
.p-hard{background:var(--red-dim);color:var(--red)}
.p-concept{background:var(--blue-dim);color:var(--blue)}
.challenge-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:5px}
.challenge-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:1rem}
.code-wrap{background:#0a0d14;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.code-header{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);background:#0d1019}
.dot{width:10px;height:10px;border-radius:50%}
.d-r{background:#ff5f57}.d-y{background:#febc2e}.d-g{background:#28c840}
.code-lang{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);letter-spacing:.08em}
.code-body{padding:1rem 1.25rem;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:2}
.ln{display:block;white-space:pre}
.ln-num{display:inline-block;width:20px;color:var(--text3);user-select:none;font-size:11px;margin-right:12px;text-align:right}
.blank-w{display:inline-flex;align-items:center;position:relative;vertical-align:middle}
.blank{display:inline-block;height:26px;background:#131929;border:1.5px dashed #2a3a5a;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text1);padding:0 8px;outline:none;vertical-align:middle;text-align:center;transition:border-color .15s,background .15s;min-width:70px}
.blank:focus{border-color:var(--blue);border-style:solid;background:#0f1826}
.blank.ok{border-color:var(--green);border-style:solid;background:var(--green-dim);color:var(--green)}
.blank.err{border-color:var(--red);border-style:solid;background:var(--red-dim);color:var(--red);animation:shk .3s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.hint-btn{display:inline-block;margin-left:5px;font-size:11px;color:var(--text3);cursor:pointer;user-select:none;transition:color .15s;border:1px solid var(--border);border-radius:4px;padding:1px 5px;background:var(--bg3)}
.hint-btn:hover{color:var(--text1)}
.htip{display:none;position:absolute;left:0;bottom:calc(100% + 6px);background:#2d1f4a;color:#c4b5fd;font-family:'Space Grotesk',sans-serif;font-size:11px;padding:5px 10px;border-radius:7px;white-space:nowrap;z-index:10;pointer-events:none;border:1px solid #4c3789}
.blank-w:hover .htip{display:block}
.output-wrap{margin-top:.75rem;background:#0a0d14;border-radius:8px;padding:.75rem 1rem;font-family:'JetBrains Mono',monospace;font-size:12.5px;display:none;border:1px solid var(--border)}
.output-wrap.show{display:block}
.out-label{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.out-val{color:var(--green)}
.actions{display:flex;align-items:center;gap:8px;margin-top:1rem;flex-wrap:wrap}
.btn-primary{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:7px 18px;border-radius:8px;background:var(--green);color:#061a0e;border:none;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.85}
.btn-primary:active{transform:scale(.97)}
.btn-sec{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;background:transparent;color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--bg3);color:var(--text1)}
.btn-reset{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;background:transparent;color:var(--text3);border:1px solid var(--border);cursor:pointer;transition:all .15s;margin-left:auto}
.btn-reset:hover{color:var(--text2);background:var(--bg2)}
.fb{font-size:13px;font-weight:600;padding:5px 12px;border-radius:7px;display:none;font-family:'JetBrains Mono',monospace}
.fb.show{display:inline-block}
.fb-ok{background:var(--green-dim);color:var(--green)}
.fb-err{background:var(--red-dim);color:var(--red)}
.congrats{display:none;text-align:center;padding:1.5rem;background:var(--green-dim);border-radius:12px;border:1px solid #1a6b45;color:var(--green);font-size:14px;font-weight:600;margin-top:.5rem}
.congrats.show{display:block}
.kw{color:#c084fc}.str{color:#86efac}.num{color:#fbbf24}.cmt{color:#3a4d6a}.op{color:#67e8f9}.fn{color:#60a5fa}.sym{color:#e2e8f0}
</style>

<div class="dk" id="app">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden">Exercícios de programação</h2>
  <div class="topbar">
    <span class="logo-dot" id="logo-dot"></span>
    <span class="logo-text" id="logo-text">Lógica</span>
    <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <span class="score" id="sc">0 / 10</span>
  </div>
  <div class="sec-tabs" id="sec-tabs"></div>
  <div class="tabs" id="tabs"></div>
  <div id="area"></div>
  <div class="congrats" id="congrats">Seção concluída! Parabéns pelo foco.</div>
</div>

<script>
const SECTIONS=[
  {id:'logica',label:'Lógica',accent:'#3dd68c',dim:'#1a3d2e',challenges:[
    {title:'Verificação de maioridade',diff:'easy',concept:'if / else',desc:'Complete o código que verifica se uma pessoa pode votar (18 anos ou mais).',lines:[
      {t:'int idade = 17;',hl:[{w:'int',c:'kw'},{w:'17',c:'num'}]},
      {t:''},
      {t:'_____ (idade >= 18) {',blanks:[{a:'if',h:'palavra-chave de condição'}],hl:[{w:'>=',c:'op'},{w:'18',c:'num'}]},
      {t:'    print("Pode votar!");',hl:[{w:'print',c:'fn'},{w:'"Pode votar!"',c:'str'}]},
      {t:'} _____ {',blanks:[{a:'else',h:'caso contrário'}]},
      {t:'    print("Não pode votar.");',hl:[{w:'print',c:'fn'},{w:'"Não pode votar."',c:'str'}]},
      {t:'}'},
    ],output:'Não pode votar.'},
    {title:'Classificação de nota',diff:'easy',concept:'if / else if',desc:'Preencha as lacunas para classificar a nota: A (≥90), B (≥70), C (≥50), ou F.',lines:[
      {t:'int nota = 75;',hl:[{w:'int',c:'kw'},{w:'75',c:'num'}]},
      {t:''},
      {t:'if (nota >= 90) {',hl:[{w:'if',c:'kw'},{w:'>=',c:'op'},{w:'90',c:'num'}]},
      {t:'    print("A");',hl:[{w:'print',c:'fn'},{w:'"A"',c:'str'}]},
      {t:'} _____ if (nota >= 70) {',blanks:[{a:'else',h:'encadeamento de condições'}],hl:[{w:'if',c:'kw'},{w:'>=',c:'op'},{w:'70',c:'num'}]},
      {t:'    print("B");',hl:[{w:'print',c:'fn'},{w:'"B"',c:'str'}]},
      {t:'} else if (nota >= _____) {',blanks:[{a:'50',h:'nota mínima para C'}],hl:[{w:'else',c:'kw'},{w:'if',c:'kw'},{w:'>=',c:'op'}]},
      {t:'    print("C");',hl:[{w:'print',c:'fn'},{w:'"C"',c:'str'}]},
      {t:'} else {',hl:[{w:'else',c:'kw'}]},
      {t:'    print("F");',hl:[{w:'print',c:'fn'},{w:'"F"',c:'str'}]},
      {t:'}'},
    ],output:'B'},
    {title:'Contador com for loop',diff:'medium',concept:'for',desc:'Complete o loop que conta de 1 até 5 e imprime cada número.',lines:[
      {t:'_____ (int i = 1; i <= 5; _____) {',blanks:[{a:'for',h:'estrutura de repetição'},{a:'i++',h:'incrementa i em 1'}],hl:[{w:'int',c:'kw'},{w:'1',c:'num'},{w:'<=',c:'op'},{w:'5',c:'num'}]},
      {t:'    print(i);',hl:[{w:'print',c:'fn'}]},
      {t:'}'},
    ],output:'1  2  3  4  5'},
    {title:'Soma de números pares',diff:'medium',concept:'while + if',desc:'Preencha as lacunas para somar apenas os números pares de 1 a 10.',lines:[
      {t:'int soma = 0;',hl:[{w:'int',c:'kw'},{w:'0',c:'num'}]},
      {t:'int n = 1;',hl:[{w:'int',c:'kw'},{w:'1',c:'num'}]},
      {t:''},
      {t:'while (n <= _____) {',blanks:[{a:'10',h:'limite do loop'}],hl:[{w:'while',c:'kw'},{w:'<=',c:'op'}]},
      {t:'    if (n % 2 == _____) {',blanks:[{a:'0',h:'resto da divisão por 2 é zero'}],hl:[{w:'if',c:'kw'},{w:'%',c:'op'},{w:'2',c:'num'},{w:'==',c:'op'}]},
      {t:'        soma = soma + n;',hl:[{w:'+',c:'op'}]},
      {t:'    }'},
      {t:'    n++;',hl:[{w:'++',c:'op'}]},
      {t:'}'},
      {t:''},
      {t:'print(soma);',hl:[{w:'print',c:'fn'}]},
    ],output:'30'},
    {title:'Dias com switch',diff:'medium',concept:'switch / case',desc:'Complete o switch para exibir o nome do dia da semana (1 = Segunda...).',lines:[
      {t:'int dia = 3;',hl:[{w:'int',c:'kw'},{w:'3',c:'num'}]},
      {t:''},
      {t:'_____ (dia) {',blanks:[{a:'switch',h:'estrutura de múltiplas escolhas'}]},
      {t:"    case 1: print('Segunda'); _____;",blanks:[{a:'break',h:'evita executar os próximos casos'}],hl:[{w:'case',c:'kw'},{w:'1',c:'num'},{w:'print',c:'fn'}]},
      {t:"    case 2: print('Terça');   break;",hl:[{w:'case',c:'kw'},{w:'2',c:'num'},{w:'print',c:'fn'},{w:'break',c:'kw'}]},
      {t:"    _____ 3: print('Quarta'); break;",blanks:[{a:'case',h:'palavra-chave para cada opção'}],hl:[{w:'3',c:'num'},{w:'print',c:'fn'},{w:'break',c:'kw'}]},
      {t:"    default: print('Outro dia');",hl:[{w:'default',c:'kw'},{w:'print',c:'fn'}]},
      {t:'}'},
    ],output:'Quarta'},
    {title:'Busca em array',diff:'hard',concept:'for + if + break',desc:'Complete o código que busca o número 7 no array e imprime sua posição.',lines:[
      {t:'int nums[] = {3, 8, 7, 1, 5};',hl:[{w:'int',c:'kw'},{w:'3',c:'num'},{w:'8',c:'num'},{w:'7',c:'num'},{w:'1',c:'num'},{w:'5',c:'num'}]},
      {t:'int pos = -1;',hl:[{w:'int',c:'kw'},{w:'-1',c:'num'}]},
      {t:''},
      {t:'for (int i = 0; i < _____; i++) {',blanks:[{a:'5',h:'tamanho do array'}],hl:[{w:'for',c:'kw'},{w:'int',c:'kw'},{w:'0',c:'num'},{w:'<',c:'op'}]},
      {t:'    if (nums[i] == _____) {',blanks:[{a:'7',h:'valor que buscamos'}],hl:[{w:'if',c:'kw'},{w:'==',c:'op'}]},
      {t:'        pos = _____;',blanks:[{a:'i',h:'guarda o índice encontrado'}]},
      {t:'        _____;',blanks:[{a:'break',h:'encerra o loop'}]},
      {t:'    }'},
      {t:'}'},
      {t:''},
      {t:'print("Posição: " + pos);',hl:[{w:'print',c:'fn'},{w:'"Posição: "',c:'str'}]},
    ],output:'Posição: 2'},
    {title:'Operador ternário',diff:'easy',concept:'ternário',desc:'Use o operador ternário para classificar a temperatura em uma única linha.',lines:[
      {t:'int temp = 28;',hl:[{w:'int',c:'kw'},{w:'28',c:'num'}]},

      {t:'print(clima);',hl:[{w:'print',c:'fn'}]},

    {title:'Loop aninhado',diff:'medium',concept:'loops aninhados',desc:'Complete o loop interno para exibir a tabuada de 1 a 3.',lines:[
      {t:'for (int i = 1; i <= 3; i++) {',hl:[{w:'for',c:'kw'},{w:'int',c:'kw'},{w:'1',c:'num'},{w:'<=',c:'op'},{w:'3',c:'num'}]},
      {t:'    _____ (int j = 1; j <= 3; j++) {',blanks:[{a:'for',h:'estrutura de repetição interna'}],hl:[{w:'int',c:'kw'},{w:'1',c:'num'},{w:'<=',c:'op'},{w:'3',c:'num'}]},
      {t:'        print(i + "x" + j + "=" + (i*j));',hl:[{w:'print',c:'fn'}]},
      {t:'    }'},
      {t:'}'},
    ],output:'1x1=1  1x2=2  ...  3x3=9'},
    {title:'Repetição com do-while',diff:'medium',concept:'do-while',desc:'Complete o do-while que sempre executa pelo menos uma vez antes de checar a condição.',lines:[
      {t:'int n = 1;',hl:[{w:'int',c:'kw'},{w:'1',c:'num'}]},
      {t:''},
      {t:'_____ {',blanks:[{a:'do',h:'executa antes de verificar a condição'}]},
      {t:'    print(n);',hl:[{w:'print',c:'fn'}]},
      {t:'    n++;',hl:[{w:'++',c:'op'}]},
      {t:'} _____ (n <= 3);',blanks:[{a:'while',h:'condição de repetição'}],hl:[{w:'<=',c:'op'},{w:'3',c:'num'}]},
    ],output:'1  2  3'},
    {title:'break e continue',diff:'medium',concept:'break / continue',desc:'Complete o loop que pula os números pares e para ao passar de 7.',lines:[
      {t:'for (int i = 1; i <= 10; i++) {',hl:[{w:'for',c:'kw'},{w:'int',c:'kw'},{w:'1',c:'num'},{w:'<=',c:'op'},{w:'10',c:'num'}]},
      {t:'    if (i % 2 == 0) _____;',blanks:[{a:'continue',h:'pula para a próxima iteração'}],hl:[{w:'if',c:'kw'},{w:'%',c:'op'},{w:'2',c:'num'},{w:'==',c:'op'},{w:'0',c:'num'}]},
      {t:'    if (i > 7) _____;',blanks:[{a:'break',h:'encerra o loop'}],hl:[{w:'if',c:'kw'},{w:'>',c:'op'},{w:'7',c:'num'}]},
      {t:'    print(i);',hl:[{w:'print',c:'fn'}]},
      {t:'}'},
    ],output:'1  3  5  7'},
  ]},

  {id:'tipos',label:'Tipos de Dados',accent:'#60a5fa',dim:'#1e2f4a',challenges:[
    {title:'Declarando uma string',diff:'easy',concept:'string',desc:'Declare a variável com o tipo correto para armazenar texto.',lines:[
      {t:'_____ mensagem = "Aprendendo programação!";',blanks:[{a:'string',h:'tipo para armazenar texto'}],hl:[{w:'"Aprendendo programação!"',c:'str'}]},
      {t:'print(mensagem);',hl:[{w:'print',c:'fn'}]},
    ],output:'Aprendendo programação!'},
    {title:'Declarando inteiros',diff:'easy',concept:'int',desc:'Declare as variáveis com o tipo correto e calcule a área de um retângulo.',lines:[
      {t:'_____ largura = 8;',blanks:[{a:'int',h:'tipo para números inteiros'}],hl:[{w:'8',c:'num'}]},
      {t:'_____ altura = 5;',blanks:[{a:'int',h:'tipo para números inteiros'}],hl:[{w:'5',c:'num'}]},
      {t:'int area = largura * altura;',hl:[{w:'int',c:'kw'},{w:'*',c:'op'}]},
      {t:'print(area);',hl:[{w:'print',c:'fn'}]},
    ],output:'40'},
    {title:'Números decimais (float)',diff:'easy',concept:'float',desc:'Use o tipo correto para armazenar valores com casas decimais.',lines:[
      {t:'_____ preco = 200.0;',blanks:[{a:'float',h:'tipo para números decimais'}],hl:[{w:'200.0',c:'num'}]},
      {t:'_____ desconto = 0.15;',blanks:[{a:'float',h:'tipo para números decimais'}],hl:[{w:'0.15',c:'num'}]},
      {t:'float final = preco - (preco * desconto);',hl:[{w:'float',c:'kw'},{w:'*',c:'op'},{w:'-',c:'op'}]},
      {t:'print(final);',hl:[{w:'print',c:'fn'}]},
    ],output:'170.0'},

      {t:'_____ temIngresso = true;',blanks:[{a:'bool',h:'tipo verdadeiro ou falso'}],hl:[{w:'true',c:'kw'}]},
      {t:'_____ eventoCancelado = false;',blanks:[{a:'bool',h:'tipo verdadeiro ou falso'}],hl:[{w:'false',c:'kw'}]},
      {t:''},
      {t:'if (temIngresso && !eventoCancelado) {',hl:[{w:'if',c:'kw'},{w:'!',c:'op'}]},
      {t:'    print("Pode entrar!");',hl:[{w:'print',c:'fn'},{w:'"Pode entrar!"',c:'str'}]},

    {title:'Constantes',diff:'easy',concept:'const',desc:'Use o modificador correto para declarar um valor que não pode ser alterado.',lines:[
      {t:'_____ PI = 3.14;',blanks:[{a:'const',h:'valor que não pode ser alterado'}],hl:[{w:'3.14',c:'num'}]},

      {t:'float area = PI * raio * raio;',hl:[{w:'float',c:'kw'},{w:'*',c:'op'}]},

      {t:'float temperatura = 36.9;',hl:[{w:'float',c:'kw'},{w:'36.9',c:'num'}]},

      {t:'print(inteira);',hl:[{w:'print',c:'fn'}]},

    {title:'Concatenando strings',diff:'easy',concept:'string',desc:'Una as variáveis para formar uma frase completa usando o operador +.',lines:[
      {t:'string nome = "Ana";',hl:[{w:'string',c:'kw'},{w:'"Ana"',c:'str'}]},

      {t:'string frase = "Olá, " _____ nome _____ "! Você tem " _____ idade _____ " anos.";',blanks:[{a:'+',h:'operador de concatenação'},{a:'+',h:'operador de concatenação'},{a:'+',h:'operador de concatenação'},{a:'+',h:'operador de concatenação'}],hl:[{w:'string',c:'kw'},{w:'"Olá, "',c:'str'},{w:'"! Você tem "',c:'str'},{w:'" anos."',c:'str'}]},

    {title:'Valor nulo',diff:'easy',concept:'null',desc:'Inicialize a variável como nula e verifique antes de usá-la.',lines:[
      {t:'string usuario = _____;',blanks:[{a:'null',h:'ausência de valor'}]},
      {t:''},
      {t:'if (usuario == null) {',hl:[{w:'if',c:'kw'},{w:'==',c:'op'},{w:'null',c:'kw'}]},
      {t:'    print("Nenhum usuário logado.");',hl:[{w:'print',c:'fn'},{w:'"Nenhum usuário logado."',c:'str'}]},
      {t:'} else {',hl:[{w:'else',c:'kw'}]},
      {t:'    print("Olá, " + usuario);',hl:[{w:'print',c:'fn'}]},
      {t:'}'},

const done={};
const ans={};
SECTIONS.forEach(s=>{done[s.id]=new Set();ans[s.id]={};});
let activeSec='logica';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlLine(text,highlights){
  if(!highlights)return esc(text);
  let out=esc(text);
  highlights.forEach(({w,c})=>{
    const ew=esc(w).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    out=out.replace(new RegExp(ew,'g'),`<span class="${c}">${esc(w)}</span>`);
  });
  return out;
}
function sec(){return SECTIONS.find(s=>s.id===activeSec);}

function renderSectionTabs(){
  const el=document.getElementById('sec-tabs');
  el.innerHTML='';
  SECTIONS.forEach(s=>{
    const b=document.createElement('button');
    const isActive=s.id===activeSec;
    const isDone=done[s.id].size===s.challenges.length;
    b.className='sec-tab'+(isActive?' sec-active':'');
    b.textContent=s.label+(isDone?' ✓':'');
    if(isActive){b.style.background=s.dim;b.style.color=s.accent;b.style.borderColor=s.accent;}
    b.onclick=()=>{activeSec=s.id;renderSectionTabs();renderTabs(0);renderC(0);updateScore();};
    el.appendChild(b);
  });
  const s=sec();
  document.getElementById('logo-text').textContent=s.label;
  document.querySelector('.logo-dot').style.background=s.accent;
  document.getElementById('pf').style.background=s.accent;
}

function renderTabs(activeId){
  const s=sec();
  const el=document.getElementById('tabs');
  el.innerHTML='';
  s.challenges.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===activeId?' active':'')+(done[activeSec].has(i)?' done':'');
    b.textContent=`#${i+1}`;
    b.onclick=()=>renderC(i);
    el.appendChild(b);
  });
}

function renderC(id){
  const s=sec();
  const c=s.challenges[id];
  renderTabs(id);
  if(!ans[activeSec][id])ans[activeSec][id]={};
  const area=document.getElementById('area');
  area.innerHTML='';
  const card=document.createElement('div');
  card.className='card';
  const diffCls=c.diff==='easy'?'p-easy':c.diff==='medium'?'p-med':'p-hard';
  const diffLbl=c.diff==='easy'?'Fácil':c.diff==='medium'?'Médio':'Difícil';
  card.innerHTML=`<div class="meta"><span class="pill ${diffCls}">${diffLbl}</span><span class="pill p-concept">${c.concept}</span></div><div class="challenge-title">${c.title}</div><div class="challenge-desc">${c.desc}</div>`;
  const codeWrap=document.createElement('div');
  codeWrap.className='code-wrap';
  codeWrap.innerHTML=`<div class="code-header"><span class="dot d-r"></span><span class="dot d-y"></span><span class="dot d-g"></span><span class="code-lang">pseudocode</span></div>`;
  const body=document.createElement('div');
  body.className='code-body';
  c.lines.forEach((line,li)=>{
    const span=document.createElement('span');
    span.className='ln';
    const lineNum=`<span class="ln-num">${li+1}</span>`;
    if(!line.blanks){
      span.innerHTML=lineNum+hlLine(line.t,line.hl);
    } else {
      let html=hlLine(line.t,line.hl);
      line.blanks.forEach((b,bi)=>{
        const key=`${id}_${li}_${bi}`;
        const val=ans[activeSec][id][key]||'';
        const st=ans[activeSec][id][key+'_s']||'';
        const w=Math.max(60,(b.a.length*10)+24);
        html=html.replace('_____',`<span class="blank-w"><input class="blank ${st}" id="${key}" value="${val}" autocomplete="off" spellcheck="false" style="width:${w}px"><span class="hint-btn">?<span class="htip">${b.h}</span></span></span>`);
      });
      span.innerHTML=lineNum+html;
    }
    body.appendChild(span);
  });
  codeWrap.appendChild(body);
  card.appendChild(codeWrap);
  const outWrap=document.createElement('div');
  outWrap.className='output-wrap'+(done[activeSec].has(id)?' show':'');
  outWrap.innerHTML=`<div class="out-label">saída</div><div class="out-val">${c.output}</div>`;
  card.appendChild(outWrap);
  const actions=document.createElement('div');
  actions.className='actions';
  const bCheck=document.createElement('button');
  bCheck.className='btn-primary';bCheck.textContent='Verificar';bCheck.onclick=()=>check(id);
  const bReveal=document.createElement('button');
  bReveal.className='btn-sec';bReveal.textContent='Revelar';bReveal.onclick=()=>reveal(id);
  const fb=document.createElement('span');
  fb.className='fb';fb.id='fb_'+id;
  const bReset=document.createElement('button');
  bReset.className='btn-reset';bReset.textContent='Resetar';bReset.onclick=()=>{ans[activeSec][id]={};renderC(id);};
  actions.appendChild(bCheck);actions.appendChild(bReveal);actions.appendChild(fb);actions.appendChild(bReset);
  card.appendChild(actions);
  area.appendChild(card);
}

function getBlanks(id){
  const c=sec().challenges[id];
  const res=[];
  c.lines.forEach((l,li)=>{
    if(!l.blanks)return;
    l.blanks.forEach((b,bi)=>res.push({key:`${id}_${li}_${bi}`,a:b.a,li,bi}));
  });
  return res;
}

function check(id){
  const blanks=getBlanks(id);
  let ok=true;
  blanks.forEach(({key,a})=>{
    const inp=document.getElementById(key);if(!inp)return;
    const v=inp.value.trim();
    ans[activeSec][id][key]=v;
    if(v.toLowerCase()===a.toLowerCase()){
      inp.className='blank ok';ans[activeSec][id][key+'_s']='ok';
    } else {
      inp.className='blank err';ans[activeSec][id][key+'_s']='err';ok=false;
      setTimeout(()=>{inp.className='blank';ans[activeSec][id][key+'_s']='';},700);
    }
  });
  const fb=document.getElementById('fb_'+id);
  if(ok){
    fb.textContent='✓ Correto!';fb.className='fb show fb-ok';
    if(!done[activeSec].has(id)){done[activeSec].add(id);updateScore();}
    document.querySelector('.output-wrap').classList.add('show');
    renderTabs(id);renderSectionTabs();
  } else {
    fb.textContent='✗ Revise as lacunas.';fb.className='fb show fb-err';
    setTimeout(()=>{fb.className='fb';},2000);
  }
}

function reveal(id){
  getBlanks(id).forEach(({key,a})=>{
    const inp=document.getElementById(key);if(!inp)return;
    inp.value=a;inp.className='blank ok';ans[activeSec][id][key]=a;ans[activeSec][id][key+'_s']='ok';
  });
  if(!done[activeSec].has(id)){done[activeSec].add(id);updateScore();}
  document.querySelector('.output-wrap').classList.add('show');
  renderTabs(id);renderSectionTabs();
}

function updateScore(){
  const s=sec();
  const n=done[activeSec].size;
  const t=s.challenges.length;
  document.getElementById('sc').textContent=`${n} / ${t}`;
  document.getElementById('pf').style.width=`${(n/t)*100}%`;
  if(n===t)document.getElementById('congrats').classList.add('show');
  else document.getElementById('congrats').classList.remove('show');
}

renderSectionTabs();
renderTabs(0);
renderC(0);
updateScore();
</script>
