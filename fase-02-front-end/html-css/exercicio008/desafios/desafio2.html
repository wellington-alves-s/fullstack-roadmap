<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>

<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag
        deverá utilizar em cada caso.</p>
    <ul>
        <li abbr title="Use a tag &lt;p&gt;">Paragrafos</li>
        <!-- A tag <abbr> é usada para definir uma abreviação, pode ser usada em conjunto com a tag title para fornecer mais informações sobre a abreviação dentro de outras tags -->
        <li abbr title="Use a tag &lt;h1&gt; até &lt;h6&gt;">Titulos</li>
        <li abbr title="Use a tag &lt;img&gt;">Imagens</li>
        <li abbr title="Use a tag &lt;abbr&gt;">Abreviações</li>
        <li abbr title="Use a tag &lt;code&gt;">Codigo fonte</li>
        <li abbr title="Use a tag &lt;ol&gt;">Listas numeradas</li>
        <li abbr title="Use a tag &lt;ul&gt;">Listas com demarcadores</li>
    </ul>
</body>

</html>
