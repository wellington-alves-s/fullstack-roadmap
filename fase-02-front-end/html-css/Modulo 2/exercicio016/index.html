<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{ /* Configurações globais do css */
            height: 100%;
        }
        body{
            background: linear-gradient(to bottom, #594FA0, #933D98, #E62D54, #EE472F, #ED9B45); /* Gradiente linear, do vermelho para o amarelo, de baixo para cima, pode ser alterado para 'to bottom', 'to left' ou 'to right' */
            background-attachment: fixed; /* Faz com que o plano de fundo fique fixo, ou seja, não se mova quando a página for rolada */
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
