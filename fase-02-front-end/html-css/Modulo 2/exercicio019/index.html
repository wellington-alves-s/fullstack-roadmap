<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo classes</title>
    <style>
        div {
            display: inline-block;
            border: solid 1px black;
            background-color: rgb(143, 143, 143);
            color: white;
            width: 100px;
            height: 100px;
            text-align: center;
        }
        div:hover {
            background-color: rgb(255, 255, 0);
        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
