<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa box-level</title>
    <style>
        h1 {
            background-color: lightblue;
            height: 300px;
            width: 420px;
            border-width: 10px;
            border-style: solid;
            border-color: black;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;

            outline-width: 10px;
            outline-style: dashed;
            outline-color: blue;
        }/* O modelo de caixa box-level é o modelo de caixa mais comum, ele é usado para elementos que ocupam toda a largura disponível, como h1, p, div, etc. Ele é composto por quatro partes: conteúdo, padding, border e margin. O conteúdo é a parte onde fica o texto ou imagem, o padding é a parte que fica entre o conteúdo e a borda, a borda é a parte que fica entre o padding e a margem, e a margem é a parte que fica entre a borda e os outros elementos. */
        /* margin: auto; centraliza o elemento horizontalmente, mas para isso é necessário que o elemento tenha uma largura definida. */
        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafo também são exemplos de elementos box-level, mas os <a href="#">links são elementos inline-level.</a> Vamos ver como tudo isso funciona.</p>
</body>
</html>
