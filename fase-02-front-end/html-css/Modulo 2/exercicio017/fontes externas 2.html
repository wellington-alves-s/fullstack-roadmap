<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas baixadas</title> <!-- Baixar fontes de sites como Dafont -->
    <style>
        @font-face {
            font-family: 'Love';
            src: url(fonts/Love.ttf) format(truetype);
            /* O nome da fonte e o caminho do arquivo, format pode ser opentype(otf), 
            truetype(ttf), 
            embed-opentype, 
            truetype-aat(apple Advanced Typography), 
            svg 
            Ideal colocar as fonts em uma pasta "fonts" 
            Pode-se utilizar o fonts ninja para capturar fonts em outros sites
            Também pode-se utilizar o whatfontis ou o Myfonts para identificar fontes em imagens */
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Love', cursive;
            font-size: 3em;
            font-weight: bold;
            font-style: normal;
        }
    </style>
</head>

<body>
    <h1>Olá mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iure dicta natus doloremque eius distinctio rem ex ipsum
        repudiandae modi! Ex rerum perferendis accusamus, id mollitia odit porro ab fugiat quod?</p>
</body>

</html>
